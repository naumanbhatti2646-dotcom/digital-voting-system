<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Voters</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>

{% if users %}
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
        </tr>
    </thead>

    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>  
            <td>{{ user.department }}</td>
        </tr>
        {% endfor %}
    </tbody>

</table>

{% else %}
<h4 style="text-align:center; color:#555;">No Voters Registered</h4>
{% endif %}

</body>
</html>
